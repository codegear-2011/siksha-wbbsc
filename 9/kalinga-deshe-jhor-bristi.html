<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalinga Deshe Jhor Brishti-siksha wb</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Noto Sans Bengali", sans-serif;
}

body{
    background:#e9ecef;
}

/* HEADER */
.header{
    background: linear-gradient(135deg,#0f2a2f,#355c66);
    color:white;
    padding:25px 15px;
    border-radius:0 0 20px 20px;
    position:relative;
    text-align:center;
}

.back{
    position:absolute;
    left:10px;
    top:15px;
    border:1px solid rgba(255,255,255,0.5);
    padding:8px 15px;
    border-radius:20px;
}

.timer{
    position:absolute;
    right:10px;
    top:15px;
    background:orange;
    padding:8px 15px;
    border-radius:20px;
    font-weight:bold;
}

.header h2{
    font-size:26px;
    margin-top:20px;
}

.header p{
    color:#ffd54f;
}

/* SET NAV */
.set-nav{
    display:flex;
    justify-content:space-between;
    padding:15px;
}

.nav-btn{
    padding:10px 20px;
    border-radius:20px;
    border:2px solid #ccc;
}

.active{
    background:#2d4f7c;
    color:white;
    border:none;
}

/* QUESTION CARD */
.card{
    background:white;
    margin:15px;
    padding:20px;
    border-radius:20px;
    border-left:5px solid #3a7bd5;
}

.question{
    font-size:18px;
    margin-bottom:15px;
}

/* OPTIONS */
.option{
    background:#f1f3f5;
    padding:12px;
    border-radius:12px;
    margin:10px 0;
    display:flex;
    align-items:center;
    cursor:pointer;
    border:2px solid transparent;
}

.option input{
    margin-right:10px;
}

.option.selected{
    border:2px solid #3a7bd5;
    background:#e6f0ff;
}

/* CORRECT TAG */
.correct-tag{
    background:#28a745;
    color:white;
    padding:5px 10px;
    border-radius:15px;
    margin-left:auto;
    font-size:12px;
}

/* BUTTONS */
.buttons{
    display:flex;
    justify-content:space-around;
    margin:20px;
}

.btn{
    padding:12px 20px;
    border-radius:25px;
    border:2px solid #2d6cdf;
    background:white;
    cursor:pointer;
}

.btn.primary{
    background:#2d6cdf;
    color:white;
    border:none;
}

/* RESULT */
.result{
    margin:15px;
    padding:15px;
    border-radius:15px;
    border:2px dashed #7bd3a7;
    background:#e8f7ef;
    text-align:center;
}

.stars{
    text-align:center;
    font-size:30px;
    margin:10px 0;
}

.big{
    text-align:center;
    font-size:28px;
}

.success{
    background:#d9f3f0;
    margin:15px;
    padding:15px;
    border-radius:15px;
    text-align:center;
}
.next-btn {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: #355c66;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    display: none; /* শুরুতে লুকানো থাকবে */
    }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

    <div class="timer" id="time-left">⏱ 00:15</div>

    <h2>১. কলিঙ্গদেশে ঝড়-বৃষ্টি</h2>
    <p>অধ্যায়ভিত্তিক মক টেস্ট</p>
</div>

<!-- NAV -->
<div class="set-nav">
    <div class="back" onclick="location.href='/9/bengali-chapter-select.html';" style="cursor: pointer;">◀ আগের</div>
    
</div>

<!-- QUESTION -->
        <div class="card">
    <div class="question" id="question">Loading...</div>
    
    <!-- এখানে ক্লাস তুলে দিয়ে শুধু ID রাখুন -->

        <!-- JS দিয়ে অপশনগুলো এখানে লোড হবে -->
    </div>
    
    <button class="next-btn" id="next-btn">পরবর্তী প্রশ্ন</button>
        </div>

    <script>
        // কুইজ ডাটাবেস
        const quizData = [
    {
        question: "‘কলিঙ্গদেশে ঝড় বৃষ্টি’ কবিতাটির কবি কে?",

        correct: 1
    },
    {
        question: "‘কলিঙ্গদেশে ঝড় বৃষ্টি’ কবিতাটির মূলগ্রন্থ কোনটি?",
        options: ["চন্ডীমঙ্গল", "ধর্মমঙ্গল", "অন্নদামঙ্গল", "মনসামঙ্গল"],
        correct: 0
    },
    {
        question: "“সঘনে চিকুর পড়ে বেঙ্গ-তড়কা বাজ” –‘চিকুর’ শব্দের অর্থ কী?",
        options: ["তাল", "নারকেল", "বিদ্যুৎ", "চুল"],
        correct: 2
    },
    {
        question: "“কলিঙ্গে সোঙরে সকল লোক” — কলিঙ্গবাসী কাকে স্মরণ করে?",
        options: ["মহাদেব", "জৈমিনি", "হনুমান", "চন্ডী"],
        correct: 1
    },
    {
        question: "কলিঙ্গদেশে কতদিন ধরে বৃষ্টি হয়েছিল?",
        options: ["তিন দিন", "চার দিন", "পাঁচ দিন", "সাত দিন"],
        correct: 3
    },
    {
        question: "“মঠ অট্টালিকা ভাঙ্গি করে খান খান” –কে মঠ-অট্টালিকা ভেঙে খানখান করে?",
        options: ["প্রবল ঝড়", "হনুমান", "চন্ডী", "মহাদেব"],
        correct: 1
    },
    {
        question: "” মঠ অট্টালিকা ভাঙ্গি করে খান খান।” – বীর হনুমান কার আদেশে এমন করেন –",
        options: ["শিব", "চণ্ডী", "জৈমিনি", "ইন্দ্র"],
        correct: 1
    },
    {
        question: "“কলিঙ্গে উড়িয়া মেঘ ডাকে উচ্চ নাদ ……..গণিয়া প্রজা ভাবয়ে বিপদ ।।” — শূন্যস্থানে বসবে",
        options: ["বিপদ", "শঙ্কা", "ঝটিকা", "প্রলয়"],
        correct: 3
    },
    {
        question: "“…… উড়িল মেঘ সঘনে চিকুর। উত্তর পবনে মেঘ ডাকে দুর দুর।।” — শূন্যস্থানে বসবে",
        options: ["উত্তরে", "নৈঋতে", "ঈশানে", "পশ্চিমে"],
        correct: 2
    },
    {
        question: "“অম্বিকামঙ্গল গান শ্রীকবিকঙ্কন” – ‘শ্রীকবিকঙ্কন’ হলেন –",
        options: ["মুকুন্দ চক্রবর্তী", "ভারতচন্দ্র রায়", "সৈয়দ আলাওল", "বিজয়গুপ্ত"],
        correct: 0
    },
    {
        question: "” _ উড়িয়া মেঘ ডাকে উচ্চ নাদ প্রলয় গণিয়া প্রজা ভাবয়ে বিপদ ।।” — শূন্যস্থানে বসবে",
        options: ["উত্তরে", "নৈঋতে", "ঈশানে", "কলিঙ্গে"],
        correct: 3
    },
    {
        question: "“ চারি মেঘে জল দেয় অষ্ট গজরাজ। __ চিকুর পড়ে বেঙ্গ-তড়কা বাজ।।” — শূন্যস্থানে বসবে",
        options: ["সজোড়ে", "সঘনে", "সবেগে", "সহসা"],
        correct: 1
    },
    {
        question: "“ঈশানে উড়িল মেঘ সঘনে চিকুর।” – ঈশান হলো",
        options: ["উত্তর-পূর্ব কোণ", "দক্ষিণ-পশ্চিম কোণ", "দক্ষিণ-পূর্ব কোণ", "উত্তর-পশ্চিম কোণ"],
        correct: 0
    },
    {
        question: "“কলিঙ্গে উড়িয়া মেঘ ডাকে উচ্চ নাদ”- কলিঙ্গদেশ হলো বর্তমান",
        options: ["কর্ণাটক", "ত্রিপুরা", "ওড়িশা", "পশ্চিমবঙ্গ"],
        correct: 2
    },
    {
        question: "করি-কর সমান বরিষে জলধারা। জলে __ একাকার পথ হইল হারা।।” — শূন্যস্থানে বসবে",
        options: ["পৃথ্বী", "বিশ্ব", "দেশ", "মহী"],
        correct: 3
    },
    {
        question: "‘কলিঙ্গদেশে ঝড়-বৃষ্টি’ কাব্যাংশের কবি মুকুন্দ চক্রবর্তীর উপাধি হলো –",
        options: ["খেলনকবি", "কেতকাদাস", "রায়গুণাকর", "কবিকঙ্কণ"],
        correct: 3
    },
    {
        question: "‘কলিঙ্গদেশে ঝড়-বৃষ্টি’ কাব্যাংশটি চণ্ডীমঙ্গল কাব্যের যে খণ্ডের অন্তর্গত –",
        options: ["আখেটিকখণ্ড", "বণিকখণ্ড", "দেবখণ্ড", "বন্দনাখণ্ড"],
        correct: 0
    },
    {
        question: "“দেখতে না পায় কেহ __।” – শূন্যস্থানের সঠিক শব্দটি হলো-",
        options: ["বাড়িঘর", "লোকজন", "অঙ্গ আপনার", "রবির কিরণ"],
        correct: 2
    },
    {
        question: "‘নিমিষেকে জোড়ে মেঘ গগন মণ্ডল।’- ‘নিমিষেকে’ শব্দটির অর্থ-",
        options: ["মুহূর্তের মধ্যে", "এক দিনে", "শেষকালে", "অবশেষে"],
        correct: 0
    },
    {
        question: "“প্রলয় গণিয়া প্রজা ভাবয়ে বিষাদ।”- এখানে কোন প্রজাদের কথা বলা হয়েছে?",
        options: ["গুজরাটবাসী", "ধর্মনগরবাসী", "কলিঙ্গবাসী", "কুরুনগরবাসী"],
        correct: 2
    },
    {
        question: "চারিদিকে মেঘে জল দিয়েছিল-",
        options: ["অষ্ট গজরাজ", "অষ্ট মেঘবালিকা", "গজরাজ", "মেঘবালিকা"],
        correct: 0
    },
    {
        question: "“করি-কর সমান বরিষে জলধারা।”-‘করি-কর’ শব্দটির অর্থ-",
        options: ["হাতির শুঁড়", "বাঘের ডাক", "ঘোড়ার ডাক", "মানুষের হাত"],
        correct: 0
    },
    {
        question: "কলিঙ্গদেশে ঝড়বৃষ্টির ফলে জলের যে ঢেউ বইতে থাকে, তা-",
        options: ["মেঘের মতো", "পর্বততুল্য", "সাগরতুল্য", "আকাশসমান"],
        correct: 1
    },
    {
        question: "মধ্যযুগে রচিত গ্রন্থগুলিতে পদের শেষে কবির নামোল্লেখকে বলা হয়-",
        options: ["পদবি", "উপাধি", "ভণিতা", "নিয়ম"],
        correct: 2
    },
    {
        question: "“অম্বিকামঙ্গল গান শ্রীকবিকঙ্কণ।।”- অম্বিকা হলেন-",
        options: ["দেবী মনসা", "দেবী চণ্ডী", "দেবী সরস্বতী", "দেবী শীতলা"],
        correct: 1
    }
];

        let currentQuestionIndex = 0;
        let score = 0;
        let timeLeft = 120;
        let timerInterval;

        const questionElement = document.getElementById("question");
        const optionsContainer = document.getElementById("options");
        const nextButton = document.getElementById("next-btn");
        const timerDisplay = document.getElementById("time-left");

        // কুইজ শুরু করার ফাংশন
        function startQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            showQuestion();
            startTimer();
        }

        function showQuestion() {
            resetState();
            let currentQuestion = quizData[currentQuestionIndex];
            questionElement.innerText = (currentQuestionIndex + 1) + ". " + currentQuestion.question;

            currentQuestion.options.forEach((option, index) => {
                const div = document.createElement("div");
                div.innerText = option;
                div.classList.add("option");
                div.addEventListener("click", () => selectOption(div, index));
                optionsContainer.appendChild(div);
            });
        }

        function resetState() {
            nextButton.style.display = "none";
            while (optionsContainer.firstChild) {
                optionsContainer.removeChild(optionsContainer.firstChild);
            }
        }

        function selectOption(element, index) {
            // আগের সিলেক্ট করা অপশন রিমুভ করা
            const allOptions = document.querySelectorAll(".option");
            allOptions.forEach(opt => opt.classList.remove("selected"));

            element.classList.add("selected");
            nextButton.style.display = "block";
            
            // স্কোর আপডেট (যদি সঠিক উত্তর হয়)
            if (index === quizData[currentQuestionIndex].correct) {
                score++;
            }
        }

        nextButton.addEventListener("click", () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                showQuestion();
                resetTimer();
            } else {
                showResult();
            }
        });

        function showResult() {
    resetState();
    clearInterval(timerInterval);

    // স্কোরের ওপর ভিত্তি করে স্টার এবং মেসেজ নির্ধারণ
    let stars = "";
    let message = "";
    let percentage = (score / quizData.length) * 100;

    if (percentage === 100) {
        stars = "⭐⭐⭐";
        message = "অসাধারণ! আপনি সব প্রশ্নের সঠিক উত্তর দিয়েছেন।";
    } else if (percentage >= 60) {
        stars = "⭐⭐";
        message = "খুব ভালো! আরও একটু চেষ্টা করলে আপনি পূর্ণ নম্বর পাবেন।";
    } else {
        stars = "⭐";
        message = "আরও অনুশীলন প্রয়োজন। আবার চেষ্টা করুন!";
    }

    // রেজাল্ট কার্ডের ডিজাইন
    questionElement.innerHTML = `<div class="big">কুইজ সম্পন্ন!</div>`;
    
    optionsContainer.innerHTML = `
        <div class="result">
            <div class="stars">${stars}</div>
            <h2 style="margin: 10px 0;">আপনার স্কোর</h2>
            <div style="font-size: 40px; font-weight: bold; color: #2d6cdf;">
                ${score} <span style="font-size: 20px; color: #666;">/ ${quizData.length}</span>
            </div>
            <p style="margin-top: 15px; color: #555; line-height: 1.5;">${message}</p>
        </div>
        
        <div class="success">
            সঠিক উত্তর দিয়েছেন: <b>${score}টি</b> <br>
            ভুল উত্তর দিয়েছেন: <b>${quizData.length - score}টি</b>
        </div>

        <button class="next-btn" style="display: block;" onclick="location.reload()">
            আবার শুরু করুন
        </button>
    `;

    // নেক্সট বাটন লুকিয়ে ফেলা (যদি থাকে)
    if(nextButton) nextButton.style.display = "none";
        }
        // টাইমার ফাংশন
        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showResult();
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timeLeft = 15;
            timerDisplay.innerText = timeLeft;
            startTimer();
        }

        // কুইজ শুরু করা যাক
        startQuiz();
    </script>
</body>
    </html>
