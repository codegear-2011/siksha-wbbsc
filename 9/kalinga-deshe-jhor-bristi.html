<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Noto Sans Bengali", sans-serif;
}

body{
    background:#e9ecef;
}

/* HEADER */
.header{
    background: linear-gradient(135deg,#0f2a2f,#355c66);
    color:white;
    padding:25px 15px;
    border-radius:0 0 20px 20px;
    position:relative;
    text-align:center;
}

.back{
    position:absolute;
    left:10px;
    top:15px;
    border:1px solid rgba(255,255,255,0.5);
    padding:8px 15px;
    border-radius:20px;
}

.timer{
    position:absolute;
    right:10px;
    top:15px;
    background:orange;
    padding:8px 15px;
    border-radius:20px;
    font-weight:bold;
}

.header h2{
    font-size:26px;
    margin-top:20px;
}

.header p{
    color:#ffd54f;
}

/* SET NAV */
.set-nav{
    display:flex;
    justify-content:space-between;
    padding:15px;
}

.nav-btn{
    padding:10px 20px;
    border-radius:20px;
    border:2px solid #ccc;
}

.active{
    background:#2d4f7c;
    color:white;
    border:none;
}

/* QUESTION CARD */
.card{
    background:white;
    margin:15px;
    padding:20px;
    border-radius:20px;
    border-left:5px solid #3a7bd5;
}

.question{
    font-size:18px;
    margin-bottom:15px;
}

/* OPTIONS */
.option{
    background:#f1f3f5;
    padding:12px;
    border-radius:12px;
    margin:10px 0;
    display:flex;
    align-items:center;
    cursor:pointer;
    border:2px solid transparent;
}

.option input{
    margin-right:10px;
}

.option.selected{
    border:2px solid #3a7bd5;
    background:#e6f0ff;
}

/* CORRECT TAG */
.correct-tag{
    background:#28a745;
    color:white;
    padding:5px 10px;
    border-radius:15px;
    margin-left:auto;
    font-size:12px;
}

/* BUTTONS */
.buttons{
    display:flex;
    justify-content:space-around;
    margin:20px;
}

.btn{
    padding:12px 20px;
    border-radius:25px;
    border:2px solid #2d6cdf;
    background:white;
    cursor:pointer;
}

.btn.primary{
    background:#2d6cdf;
    color:white;
    border:none;
}

/* RESULT */
.result{
    margin:15px;
    padding:15px;
    border-radius:15px;
    border:2px dashed #7bd3a7;
    background:#e8f7ef;
    text-align:center;
}

.stars{
    text-align:center;
    font-size:30px;
    margin:10px 0;
}

.big{
    text-align:center;
    font-size:28px;
}

.success{
    background:#d9f3f0;
    margin:15px;
    padding:15px;
    border-radius:15px;
    text-align:center;
}
.next-btn {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: #355c66;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    display: none; /* শুরুতে লুকানো থাকবে */
    }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

    <div class="timer" id="time-left">⏱ 00:15</div>

    <h2>১. কলিঙ্গদেশে ঝড়-বৃষ্টি</h2>
    <p>অধ্যায়ভিত্তিক মক টেস্ট</p>
</div>

<!-- NAV -->
<div class="set-nav">
    <div class="back">◀ আগের</div>
    <div class="nav-btn active">সেট ১ / ৫</div>
    <div class="nav-btn">পরের ▶</div>
</div>

<!-- QUESTION -->
        

    <div class="card">
        <div class="question" id="question">Loading...</div>
        <div class="option" id="options">
            <!-- অপশনগুলো JS দিয়ে এখানে আসবে -->
        </div>
        <button class="next-btn" id="next-btn">পরবর্তী প্রশ্ন</button>
    </div>

    <script>
        // কুইজ ডাটাবেস
        const quizData = [
            {
                question: "আমাদের সৌরজগতের বৃহত্তম গ্রহ কোনটি?",
                options: ["মঙ্গল", "বৃহস্পতি", "শনি", "শুক্র"],
                correct: 1
            },
            {
                question: "পদ্মা সেতু কোন নদীর ওপর নির্মিত?",
                options: ["যমুনা", "মেঘনা", "পদ্মা", "ব্রহ্মপুত্র"],
                correct: 2
            },
            {
                question: "নিচের কোনটি কম্পিউটারের ইনপুট ডিভাইস?",
                options: ["মনিটর", "মাউস", "প্রিন্টার", "স্পিকার"],
                correct: 1
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let timeLeft = 15;
        let timerInterval;

        const questionElement = document.getElementById("question");
        const optionsContainer = document.getElementById("options");
        const nextButton = document.getElementById("next-btn");
        const timerDisplay = document.getElementById("time-left");

        // কুইজ শুরু করার ফাংশন
        function startQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            showQuestion();
            startTimer();
        }

        function showQuestion() {
            resetState();
            let currentQuestion = quizData[currentQuestionIndex];
            questionElement.innerText = (currentQuestionIndex + 1) + ". " + currentQuestion.question;

            currentQuestion.options.forEach((option, index) => {
                const div = document.createElement("div");
                div.innerText = option;
                div.classList.add("option");
                div.addEventListener("click", () => selectOption(div, index));
                optionsContainer.appendChild(div);
            });
        }

        function resetState() {
            nextButton.style.display = "none";
            while (optionsContainer.firstChild) {
                optionsContainer.removeChild(optionsContainer.firstChild);
            }
        }

        function selectOption(element, index) {
            // আগের সিলেক্ট করা অপশন রিমুভ করা
            const allOptions = document.querySelectorAll(".option");
            allOptions.forEach(opt => opt.classList.remove("selected"));

            element.classList.add("selected");
            nextButton.style.display = "block";
            
            // স্কোর আপডেট (যদি সঠিক উত্তর হয়)
            if (index === quizData[currentQuestionIndex].correct) {
                score++;
            }
        }

        nextButton.addEventListener("click", () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                showQuestion();
                resetTimer();
            } else {
                showResult();
            }
        });

        function showResult() {
            resetState();
            questionElement.innerText = "কুইজ শেষ!";
            optionsContainer.innerHTML = `<h3>আপনার স্কোর: ${score} / ${quizData.length}</h3>`;
            clearInterval(timerInterval);
        }

        // টাইমার ফাংশন
        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showResult();
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timeLeft = 15;
            timerDisplay.innerText = timeLeft;
            startTimer();
        }

        // কুইজ শুরু করা যাক
        startQuiz();
    </script>
</body>
    </html>
