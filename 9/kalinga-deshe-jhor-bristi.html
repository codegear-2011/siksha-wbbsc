<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Noto Sans Bengali", sans-serif;
}

body{
    background:#e9ecef;
}

/* HEADER */
.header{
    background: linear-gradient(135deg,#0f2a2f,#355c66);
    color:white;
    padding:25px 15px;
    border-radius:0 0 20px 20px;
    position:relative;
    text-align:center;
}

.back{
    position:absolute;
    left:10px;
    top:15px;
    border:1px solid rgba(255,255,255,0.5);
    padding:8px 15px;
    border-radius:20px;
}

.timer{
    position:absolute;
    right:10px;
    top:15px;
    background:orange;
    padding:8px 15px;
    border-radius:20px;
    font-weight:bold;
}

.header h2{
    font-size:26px;
    margin-top:20px;
}

.header p{
    color:#ffd54f;
}

/* SET NAV */
.set-nav{
    display:flex;
    justify-content:space-between;
    padding:15px;
}

.nav-btn{
    padding:10px 20px;
    border-radius:20px;
    border:2px solid #ccc;
}

.active{
    background:#2d4f7c;
    color:white;
    border:none;
}

/* QUESTION CARD */
.card{
    background:white;
    margin:15px;
    padding:20px;
    border-radius:20px;
    border-left:5px solid #3a7bd5;
}

.question{
    font-size:18px;
    margin-bottom:15px;
}

/* OPTIONS */
.option{
    background:#f1f3f5;
    padding:12px;
    border-radius:12px;
    margin:10px 0;
    display:flex;
    align-items:center;
    cursor:pointer;
    border:2px solid transparent;
}

.option input{
    margin-right:10px;
}

.option.selected{
    border:2px solid #3a7bd5;
    background:#e6f0ff;
}

/* CORRECT TAG */
.correct-tag{
    background:#28a745;
    color:white;
    padding:5px 10px;
    border-radius:15px;
    margin-left:auto;
    font-size:12px;
}

/* BUTTONS */
.buttons{
    display:flex;
    justify-content:space-around;
    margin:20px;
}

.btn{
    padding:12px 20px;
    border-radius:25px;
    border:2px solid #2d6cdf;
    background:white;
    cursor:pointer;
}

.btn.primary{
    background:#2d6cdf;
    color:white;
    border:none;
}

/* RESULT */
.result{
    margin:15px;
    padding:15px;
    border-radius:15px;
    border:2px dashed #7bd3a7;
    background:#e8f7ef;
    text-align:center;
}

.stars{
    text-align:center;
    font-size:30px;
    margin:10px 0;
}

.big{
    text-align:center;
    font-size:28px;
}

.success{
    background:#d9f3f0;
    margin:15px;
    padding:15px;
    border-radius:15px;
    text-align:center;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="back">← ফিরে যান</div>
    <div class="timer">⏱ 02:49</div>

    <h2>১. কলিঙ্গদেশে ঝড়-বৃষ্টি</h2>
    <p>অধ্যায়ভিত্তিক মক টেস্ট</p>
</div>

<!-- NAV -->
<div class="set-nav">
    <div class="nav-btn">◀ আগের</div>
    <div class="nav-btn active">সেট ১ / ৫</div>
    <div class="nav-btn">পরের ▶</div>
</div>

<!-- QUESTION -->
<div class="card">
    <div class="question">
        ১০. ‘মুষলধারে’ শব্দের অর্থ কী?
    </div>

    <div class="option" onclick="selectOption(this)">
        <input type="radio" name="q">
        পেষণদণ্ড
    </div>

    <div class="option" onclick="selectOption(this)">
        <input type="radio" name="q">
        গাদা
    </div>

    <div class="option" onclick="selectOption(this)">
        <input type="radio" name="q">
        অত্যন্ত মোটা ধারায়
        <span class="correct-tag">✓ সঠিক</span>
    </div>

    <div class="option" onclick="selectOption(this)">
        <input type="radio" name="q">
        অত্যন্ত বেগে
    </div>
</div>

<!-- BUTTONS -->
<div class="buttons">
    <button class="btn">↺ রিসেট</button>
    <button class="btn primary">✔ উত্তর যাচাই</button>
</div>

<!-- RESULT -->
<div class="result">
    ✔ প্রাপ্ত নম্বর: ১০ / ১০
</div>

<div class="stars">
    ⭐ ⭐ ⭐
</div>

<div class="big">
    ( অসাধারণ! )
</div>

<div class="success">
    🔓 অভিনন্দন! আপনি পরের সেটটি আনলক করেছেন!
</div>

<script>
function selectOption(el){
    document.querySelectorAll('.option').forEach(o=>{
        o.classList.remove('selected');
    });
    el.classList.add('selected');
}
</script>

</body>
  </html>
