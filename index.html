<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Test</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Noto Sans Bengali", sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f2a2f, #2e5c63);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Main Card */
.card {
    width: 90%;
    max-width: 400px;
    background: #f2f2f2;
    border-radius: 25px;
    padding: 25px 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Title */
.title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
}

/* Icon */
.icon {
    font-size: 50px;
    margin: 15px 0;
}

/* Welcome */
.welcome {
    font-size: 20px;
    margin-top: 10px;
    color: #2c3e50;
}

/* Highlight */
.highlight {
    font-size: 34px;
    font-weight: bold;
    color: #ff4d4d;
    margin: 5px 0 15px;
}

/* Description */
.desc {
    font-size: 14px;
    color: #555;
    line-height: 1.6;
    margin-bottom: 20px;
}

/* Topic Box */
.topic {
    background: linear-gradient(135deg, #16a085, #2ecc71);
    color: white;
    padding: 15px;
    border-radius: 15px;
    font-weight: bold;
    font-size: 16px;
    margin-bottom: 25px;
}

/* Button */
.btn {
    background: linear-gradient(135deg, #1da1f2, #1c6ed5);
    color: white;
    padding: 15px;
    border-radius: 30px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    width: 100%;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.03);
}

/* Footer */
.footer {
    margin-top: 20px;
    font-size: 13px;
    color: #777;
}
</style>
</head>

<body>

<div class="card">

    <div class="title"> siksha wb মক টেস্ট চ্যালেঞ্জ</div>

    <div class="icon">🎓</div>

    <div class="welcome">স্বাগতম!</div>

    <div class="highlight">শিক্ষা wb</div>

    <div class="desc">
        <b></b>স্মার্ট মক টেস্ট তোমাকে জানাই স্বাগতা।
        তোমার প্রস্তুতি যাচাই করতে এখনই টেস্ট শুরু করো!
    </div>

    
    <button class="btn" onclick="startTest()">টেস্ট শুরু করো</button>

    <div class="footer">
        সময়: ১০ মিনিট | মোট প্রশ্ন: ১০টি
    </div>

</div>



</body>
  </html>
